<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Registration Form</title>
</head>
<body>

    <h1>Student Registration Form</h1>

    <form action="submit">

        <!-- Full Name -->
        <label for="name">Full Name:</label>
        <input type="text" id="name" name="name" placeholder="Triselle Bernabe" required>
        <br><br>

        <!-- Email -->
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="cute@gmail.com" required>
        <br><br>

        <!-- Password -->
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" required>
        <br><br>

        <!-- Gender -->
        <label>Gender:</label>
        <input type="radio" id="female" name="gender" value="Female">
        <label for="female">Female</label>

        <input type="radio" id="male" name="gender" value="Male" required>
        <label for="male">Male</label>
        <br><br>

        <!-- Hobbies -->
        <label>Hobbies:</label>
        <input type="checkbox" id="journaling" name="hobbies" value="Journaling">
        <label for="journaling">Journaling</label>

        <input type="checkbox" id="genshin" name="hobbies" value="Playing Genshin">
        <label for="genshin">Playing Genshin</label>

        <input type="checkbox" id="socializing" name="hobbies" value="Socializing">
        <label for="socializing">Socializing</label>
        <br><br>

        <!-- Course -->
        <label for="course">Course:</label>
        <select id="course" name="course" required>
            <option value="">--Select Course--</option>
            <option value="Computer Science">Computer Science</option>
            <option value="Chemical Engineering">Chemical Engineering</option>
            <option value="Psychology">Psychology</option>
        </select>
        <br><br>

        <!-- Message -->
        <label for="message">Message:</label><br>
        <textarea id="message" name="message" placeholder="Type something here"></textarea>
        <br><br>

        <!-- Buttons -->
        <button type="submit">Submit</button>
        <button type="reset">Reset</button>

    </form>

</body>
</html>
